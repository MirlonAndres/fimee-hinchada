<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏀 FIMEE Hinchada</title>
  
  <!-- PWA & SEO -->
  <meta name="theme-color" content="#0a0a1a">
  <meta name="description" content="Cancionero oficial de la barra FIMEE para la final vs Educación">
  <meta property="og:title" content="🏀 FIMEE Hinchada - Cánticos">
  <meta property="og:description" content="Encontrá el cántico perfecto para alentar a FIMEE. Final vs Educación.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="header-title">
        <h1>FIMEE HINCHADA</h1>
        <span>⚡ FINAL vs EDUCACIÓN</span>
      </div>
      <div class="font-controls">
        <button class="btn-font" id="btnFontMinus" aria-label="Achicar letra">A-</button>
        <button class="btn-font" id="btnFontPlus" aria-label="Agrandar letra">A+</button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-container">
      <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar canción o #número...">
        <button id="searchClear" class="search-clear" aria-label="Limpiar búsqueda">✕</button>
      </div>
    </div>

    <!-- Categories -->
    <div class="categories-wrapper" id="categoriesWrapper">
      <button class="pill active" data-category="todos">🔥 Todos</button>
      <button class="pill" data-category="clasico">🎵 Clásico</button>
      <button class="pill" data-category="ataque">⚔️ Ataque</button>
      <button class="pill" data-category="burla">😂 Burla</button>
      <button class="pill" data-category="calientes">💃 Calientes</button>
      <button class="pill" data-category="respuesta">💬 Respuesta</button>
      <button class="pill" data-category="aguante">💪 Aguante</button>
      <button class="pill" data-category="falla">😤 Falla</button>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsDisplay">
      Cargando canciones...
    </div>

    <!-- Songs Container -->
    <main class="songs-container" id="songsContainer">
      <!-- Songs will be rendered here by app.js -->
    </main>

    <!-- FAB Grid Trigger -->
    <button class="fab" id="fabGrid" aria-label="Abrir teclado numérico">
      #️⃣
    </button>

    <!-- Grid Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="grid-modal">
        <div class="grid-header">
          <h3>Ir a canción:</h3>
          <button class="btn-close" id="btnCloseGrid">✕</button>
        </div>
        <div class="numbers-grid" id="numbersGrid">
          <!-- Buttons generated by app.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => console.log('SW registrado'))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
